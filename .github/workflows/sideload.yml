name: Build Clean IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ipa:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean build artifacts
        run: flutter clean

      - name: Re-install dependencies after clean
        run: flutter pub get

      # Build using xcodebuild directly
      - name: Build iOS Release (no codesign)
        run: |
          flutter build ios --release --no-codesign --config-only
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM='' \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CONFIGURATION_BUILD_DIR="$GITHUB_WORKSPACE/build/ios/iphoneos" | tail -20

      # Nuclear Cleanup for Sideloadly compatibility
      - name: Strip all code signatures and clean app bundle
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          
          echo "=== Step 1: Remove PlugIns folder ==="
          rm -rf "$APP_PATH/PlugIns"
          
          echo "=== Step 2: Remove Watch folder ==="
          rm -rf "$APP_PATH/Watch"
          
          echo "=== Step 3: Remove ALL _CodeSignature directories ==="
          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          
          echo "=== Step 4: Remove all .mobileprovision files ==="
          find "$APP_PATH" -name "*.mobileprovision" -type f -delete 2>/dev/null || true
          
          echo "=== Step 5: Remove Mac metadata files ==="
          find "$APP_PATH" -name "__MACOSX" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name ".DS_Store" -type f -delete 2>/dev/null || true
          find "$APP_PATH" -name "._*" -type f -delete 2>/dev/null || true
          
          echo "=== Step 6: Remove broken symlinks ==="
          find "$APP_PATH" -type l ! -exec test -e {} \; -delete 2>/dev/null || true
          
          echo "=== Step 7: Ad-hoc re-sign all frameworks ==="
          if [ -d "$APP_PATH/Frameworks" ]; then
            for fw in "$APP_PATH/Frameworks"/*.framework; do
              if [ -d "$fw" ]; then
                echo "Ad-hoc signing: $fw"
                codesign --force --deep --sign - "$fw" 2>/dev/null || true
              fi
            done
            for dylib in "$APP_PATH/Frameworks"/*.dylib; do
              if [ -f "$dylib" ]; then
                echo "Ad-hoc signing: $dylib"
                codesign --force --sign - "$dylib" 2>/dev/null || true
              fi
            done
          fi
          
          echo "=== Step 8: Ad-hoc sign the main app ==="
          codesign --force --deep --sign - "$APP_PATH" 2>/dev/null || true
          
          echo "=== Cleanup complete ==="
          echo "App bundle contents:"
          ls -la "$APP_PATH/"

      # Package as IPA
      - name: Create IPA package
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r -X app.ipa Payload
          echo "IPA size: $(du -h app.ipa | cut -f1)"

      # Upload
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa-sideload
          path: app.ipa
          retention-days: 30
